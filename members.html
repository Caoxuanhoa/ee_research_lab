<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thành viên | EE Research Lab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ee-green: #40a045;
            --ee-blue: #00558a;
            --ee-dark: #2d3436;
        }
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; color: #333; }

        /* Giữ nguyên Menu như trang chủ */
        .navbar { background-color: #ffffff; box-shadow: 0 2px 15px rgba(0,0,0,0.08); padding: 12px 0; }
        .logo-text { font-size: 1.6rem; font-weight: 900; letter-spacing: 0.5px; margin-left: 10px; line-height: 1; }
        .logo-ee { color: var(--ee-blue); }
        .logo-lab { color: var(--ee-dark); font-weight: 800; }
        .nav-link { color: var(--ee-dark) !important; font-weight: 600; margin-left: 18px; }

        /* Header trang thành viên */
        .page-header {
            background: linear-gradient(135deg, var(--ee-blue), var(--ee-green));
            color: white;
            padding: 60px 0;
            text-align: center;
            margin-bottom: 50px;
        }

        /* Thẻ thành viên */
        .member-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
            border: 1px solid #eee;
            height: 100%;
        }
        .member-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-color: var(--ee-green);
        }
        .member-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 3px solid #f0f0f0;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="images/logo1.jpg" alt="EE Lab Logo" style="height: 35px; width: auto; margin-right: 10px;">
                <span class="logo-text"><span class="logo-ee">EE</span> <span class="logo-lab">RESEARCH LAB</span></span>
            </a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Trang Chủ</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#team">Đội Ngũ Nòng Cốt</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="page-header">
        <div class="container">
            <h1 style="font-weight: 800; font-size: 3rem;">Đội Ngũ Sinh Viên & NCS</h1>
            <p style="opacity: 0.9;">Những tài năng trẻ đang học tập và nghiên cứu tại EE Research Lab</p>
        </div>
    </header>

    <div class="container mb-5">
        <div class="row g-4">

            <div class="col-md-3 col-sm-6">
                <div class="member-card">
                    <img src="images/avatar-default.jpg" alt="Cao Xuân Hoá" class="member-img">
                    <h5 style="font-weight: 700; margin-bottom: 5px;">Cao Xuân Hoá</h5>
                    <p style="color: var(--ee-blue); font-size: 0.9rem; font-weight: 600;">Sinh viên K70 - Team Support</p>
                    <p style="font-size: 0.8rem; color: #777;">EE Research Lab Member</p>
                </div>
            </div>

            <div class="col-md-3 col-sm-6">
                <div class="member-card">
                    <img src="images/avatar-default.jpg" alt="Thành viên mới" class="member-img">
                    <h5 style="font-weight: 700; margin-bottom: 5px;">Nguyễn Văn A</h5>
                    <p style="color: var(--ee-blue); font-size: 0.9rem; font-weight: 600;">Nghiên cứu sinh K68</p>
                    <p style="font-size: 0.8rem; color: #777;">Lĩnh vực: Pin mặt trời</p>
                </div>
            </div>

            </div>

        <div class="text-center mt-5">
            <a href="index.html" style="text-decoration: none; color: var(--ee-blue); font-weight: 600;">&larr; Quay lại Trang Chủ</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
